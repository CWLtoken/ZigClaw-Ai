name: ZigClaw CI

on:
  push:
    branches: [ main, agent, zigclaw-hermes ]
  pull_request:
    branches: [ main, agent, zigclaw-hermes ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.21  # 先用一个基础镜像，然后手动装Zig
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y wget xz-utils build-essential
        
    - name: Install Zig 0.16.0
      run: |
        echo "Downloading Zig 0.16.0..."
        wget -v https://github.com/ziglang/zig/releases/download/0.16.0/zig-linux-x86_64-0.16.0.tar.xz
        tar xf zig-linux-x86_64-0.16.0.tar.xz
        mv zig-linux-x86_64-0.16.0 /usr/local/zig
        ln -s /usr/local/zig/zig /usr/local/bin/zig
        rm zig-linux-x86_64-0.16.0.tar.xz
        zig version
        
    - name: Run full test suite
      run: zig test src/tests.zig src/image_feature.c -ODebug --library c 2>&1
        
    - name: Verify compilation
      run: |
        if [ -f "src/main.zig" ]; then
          zig build-exe src/main.zig src/image_feature.c -lc -OReleaseFast
        fi
        
    - name: Verify no debug artifacts
      run: |
        if [ -f "simple_server" ] || [ -f "src/simple_server.zig" ] || [ -f "test_zig_api" ]; then
          echo "Error: Debug artifacts found"
          exit 1
        fi
        echo "No debug artifacts found"
