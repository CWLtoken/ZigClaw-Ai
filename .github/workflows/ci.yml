name: ZigClaw CI

on:
  push:
    branches: [ main, agent, zigclaw-hermes ]
  pull_request:
    branches: [ main, agent, zigclaw-hermes ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Debug info
      run: |
        echo "PWD: $PWD"
        echo "HOME: $HOME"
        ls -la
        which git
        git --version
        
    - name: Install Zig from GitHub Releases
      run: |
        echo "=== Downloading Zig ==="
        wget --version
        wget https://github.com/ziglang/zig/releases/download/0.16.0/zig-linux-x86_64-0.16.0.tar.xz -O /tmp/zig.tar.xz
        echo "=== Download complete ==="
        ls -la /tmp/zig.tar.xz
        tar xf /tmp/zig.tar.xz -C /tmp
        echo "=== Extract complete ==="
        ls -la /tmp/zig-linux-x86_64-0.16.0/
        /tmp/zig-linux-x86_64-0.16.0/zig version
        echo "=== Adding to PATH ==="
        echo "/tmp/zig-linux-x86_64-0.16.0" >> $GITHUB_PATH
        
    - name: Verify Zig
      run: |
        which zig
        zig version
        
    - name: Run tests
      run: zig test src/tests.zig src/image_feature.c -ODebug --library c 2>&1
