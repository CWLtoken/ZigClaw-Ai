name: ZigClaw CI

on:
  push:
    branches: [ main, agent, zigclaw-hermes ]
  pull_request:
    branches: [ main, agent, zigclaw-hermes ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache Zig 0.16.0
      id: cache-zig
      uses: actions/cache@v4
      with:
        path: ~/.zig
        key: zig-0.16.0-${{ runner.os }}

    - name: Install Zig 0.16.0 (from GitHub Releases)
      if: steps.cache-zig.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/.zig
        cd ~/.zig
        wget -q https://github.com/ziglang/zig/releases/download/0.16.0/zig-linux-x86_64-0.16.0.tar.xz
        tar xf zig-linux-x86_64-0.16.0.tar.xz
        mv zig-linux-x86_64-0.16.0/* .
        rm -rf zig-linux-x86_64-0.16.0 zig-linux-x86_64-0.16.0.tar.xz
        echo "Zig installed to ~/.zig"

    - name: Add Zig to PATH
      run: echo "$HOME/.zig" >> $GITHUB_PATH
        
    - name: Verify Zig installation
      run: zig version
       
    - name: Run full test suite
      run: zig test src/tests.zig 2>&1 | tail -50
      
    - name: Verify compilation (static binary)
      run: |
        # 尝试编译（如果存在 main.zig）
        if [ -f "src/main.zig" ]; then
          zig build-exe src/main.zig -lc -O ReleaseFast 2>&1 | tail -20
        else
          echo "src/main.zig not found, skipping compilation check"
        fi
        
    - name: Verify no debug artifacts
      run: |
        # 确保没有调试文件被提交
        if [ -f "simple_server" ] || [ -f "src/simple_server.zig" ] || [ -f "test_zig_api" ]; then
          echo "Error: Debug artifacts found in repository"
          exit 1
        fi
        echo "No debug artifacts found"
