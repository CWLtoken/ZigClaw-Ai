name: ZigClaw CI

on:
  push:
    branches: [ main, agent, zigclaw-hermes ]
  pull_request:
    branches: [ main, agent, zigclaw-hermes ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig 0.16.0
      uses: mlugg/setup-zig@v1
      with:
        version: 0.16.0

    - name: Verify Zig
      run: |
        which zig
        zig version

    - name: Run tests
      run: zig test src/tests.zig src/image_feature.c -ODebug --library c 2>&1
