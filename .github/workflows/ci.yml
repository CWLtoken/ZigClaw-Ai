name: CI

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting (Rust)
        run: cargo fmt --check
      - name: Lint (Rust)
        run: cargo clippy -- -D warnings
      - name: Check dependencies
        run: cargo check --workspace

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v3
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build (Rust)
        run: cargo build --release --workspace
      - name: Verify Zig static library fallback
        run: |
          echo "Verifying libagent_rt.a..."
          if [ -f "zig-out/lib/libagent_rt.a" ]; then
            echo "✅ Static library exists"
            nm -g zig-out/lib/libagent_rt.a | grep -E "execute_agent"
          else
            echo "⚠️  Zig build skipped, using fallback C implementation"
          fi

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run tests
        run: cargo test --workspace
