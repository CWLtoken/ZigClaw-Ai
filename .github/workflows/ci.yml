name: ZigClaw CI

on:
  push:
    branches: [ main, agent, zigclaw-hermes ]
  pull_request:
    branches: [ main, agent, zigclaw-hermes ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Zig 0.16.0
      run: |
        curl -fL --connect-timeout 30 --max-time 600 --retry 5 --retry-delay 5 \
          https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz \
          -o /tmp/zig.tar.xz
        mkdir -p /tmp/zig
        tar xJf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
        /tmp/zig/zig version
        echo "/tmp/zig" >> $GITHUB_PATH

    - name: Build project
      run: zig build 2>&1 | tee /tmp/build_output.txt

    - name: Run tests
      continue-on-error: true
      run: |
        echo "=== Running tests ===" | tee /tmp/test_output.txt
        zig test src/tests.zig src/image_feature.c -ODebug --library c 2>&1 | tee -a /tmp/test_output.txt
        TEST_EXIT=${PIPESTATUS[0]}
        echo "EXIT_CODE=$TEST_EXIT" | tee -a /tmp/test_output.txt
        if [ $TEST_EXIT -ne 0 ]; then
          echo "=== ERRORS ===" | tee -a /tmp/test_output.txt
          grep -n -E "^[0-9]+/.*test\." /tmp/test_output.txt | grep -v "OK" | tee -a /tmp/test_output.txt
        fi
        exit $TEST_EXIT

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci-logs-${{ github.event_name }}-${{ github.sha }}
        path: /tmp/test_output.txt
