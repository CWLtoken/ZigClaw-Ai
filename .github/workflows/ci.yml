name: ZigClaw CI

on:
  push:
    branches: [ main, agent, zigclaw-hermes ]
  pull_request:
    branches: [ main, agent, zigclaw-hermes ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Zig 0.16.0
      run: |
        curl -fL --connect-timeout 30 --max-time 600 --retry 5 --retry-delay 5 \
          https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz \
          -o /tmp/zig.tar.xz
        mkdir -p /tmp/zig
        tar xJf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
        /tmp/zig/zig version
        echo "/tmp/zig" >> $GITHUB_PATH

    - name: Build project
      run: zig build 2>&1

    - name: Run tests with verbose output
      run: |
        echo "=== Running tests with verbose output ==="
        zig test src/tests.zig src/image_feature.c -ODebug --library c 2>&1 | tee /tmp/test_output.txt
        TEST_EXIT=${PIPESTATUS[0]}
        echo ""
        echo "=== EXIT CODE: $TEST_EXIT ==="
        if [ $TEST_EXIT -ne 0 ]; then
          echo ""
          echo "=== SEARCHING FOR ERRORS ==="
          grep -n -E "error|Error|FAIL|fail|panic|PANIC|SIGSEGV|SIGABRT|segfault|assertion|Assertion" /tmp/test_output.txt | head -30
          echo ""
          echo "=== LAST 100 LINES ==="
          tail -100 /tmp/test_output.txt
          exit $TEST_EXIT
        fi
